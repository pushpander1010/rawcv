<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f0a1e"/>
  <!-- Gradient blob -->
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#grad)" opacity="0.3"/>
  <defs>
    <radialGradient id="grad" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Resume card mockup -->
  <rect x="680" y="80" width="440" height="470" rx="16" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- Header bar -->
  <rect x="680" y="80" width="440" height="80" rx="16" fill="#7c3aed"/>
  <rect x="700" y="100" width="120" height="14" rx="7" fill="white" opacity="0.9"/>
  <rect x="700" y="122" width="80" height="10" rx="5" fill="white" opacity="0.5"/>
  <!-- Content lines -->
  <rect x="700" y="180" width="60" height="8" rx="4" fill="#7c3aed" opacity="0.8"/>
  <rect x="700" y="198" width="380" height="6" rx="3" fill="white" opacity="0.2"/>
  <rect x="700" y="210" width="320" height="6" rx="3" fill="white" opacity="0.2"/>
  <rect x="700" y="222" width="360" height="6" rx="3" fill="white" opacity="0.2"/>
  <rect x="700" y="250" width="60" height="8" rx="4" fill="#7c3aed" opacity="0.8"/>
  <rect x="700" y="268" width="380" height="6" rx="3" fill="white" opacity="0.2"/>
  <rect x="700" y="280" width="300" height="6" rx="3" fill="white" opacity="0.2"/>
  <rect x="700" y="292" width="340" height="6" rx="3" fill="white" opacity="0.2"/>
  <rect x="700" y="320" width="60" height="8" rx="4" fill="#7c3aed" opacity="0.8"/>
  <rect x="700" y="338" width="200" height="6" rx="3" fill="white" opacity="0.2"/>
  <rect x="700" y="350" width="180" height="6" rx="3" fill="white" opacity="0.2"/>
  <!-- Skill chips -->
  <rect x="700" y="390" width="70" height="22" rx="11" fill="#7c3aed" opacity="0.4"/>
  <rect x="778" y="390" width="80" height="22" rx="11" fill="#7c3aed" opacity="0.4"/>
  <rect x="866" y="390" width="60" height="22" rx="11" fill="#7c3aed" opacity="0.4"/>
  <!-- ATS badge -->
  <rect x="700" y="430" width="100" height="32" rx="8" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
  <text x="750" y="451" font-family="system-ui" font-size="13" fill="#10b981" text-anchor="middle" font-weight="700">ATS 92</text>

  <!-- Left: Logo + tagline -->
  <text x="80" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">rawcv</text>
  <text x="80" y="300" font-family="system-ui" font-size="24" fill="#a78bfa">AI-Powered Resume Platform</text>
  <rect x="80" y="330" width="480" height="2" fill="#7c3aed" opacity="0.5"/>
  <text x="80" y="370" font-family="system-ui" font-size="18" fill="#94a3b8">ATS Score · JD Match · AI Enhancement</text>
  <text x="80" y="400" font-family="system-ui" font-size="18" fill="#94a3b8">Resume Builder · PDF Export</text>

  <!-- URL -->
  <text x="80" y="560" font-family="system-ui" font-size="16" fill="#6366f1">www.rawcv.com</text>
</svg>
